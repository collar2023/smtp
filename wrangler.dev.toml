name = "smtp"
main = "index.js"
compatibility_date = "2026-06-12"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[[r2_buckets]]
binding = "MAIL_BUCKET"
bucket_name = "smtp-mail"

[[d1_databases]]
binding = "MAIL_DB"
database_name = "smtp-mail-db"
database_id = "smtp-mail-db"  # local mode 不需要真实 ID

[[kv_namespaces]]
binding = "KEYRING_KV"
id = "7c80853c33284c74bc6816e9ec69614c"
